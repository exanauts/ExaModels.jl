name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        julia-version: ['lts', '1']
        julia-arch: [x64]
        os: [ubuntu-latest,macos-latest,windows-latest]
    steps:
      - uses: actions/checkout@v2
      - uses: julia-actions/setup-julia@latest
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@latest
      - name: Run tests
        env:
          EXAMODELS_SKIP_AOT: ${{ matrix.julia-version == 'lts' && '1' || '' }}
        run: |
          julia --startup-file=no --color=yes --project=./test -e '
            using Pkg
            Pkg.develop(path=".")
            Pkg.instantiate()
            push!(ARGS, "EXAMODELS_TEST_POCL")
            include("test/runtests.jl")'
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.julia-version == '1' && matrix.os == 'ubuntu-latest'
      - uses: codecov/codecov-action@v5
        if: matrix.julia-version == '1' && matrix.os == 'ubuntu-latest'
        with:
          files: lcov.info

  gpu:
    strategy:
      matrix:
        julia-version: ['lts', '1']
        julia-arch: [x64]
        os: [ubuntu-latest]
        backend: ['cuda', 'amdgpu', 'oneapi']
        exclude:
          - julia-version: 'lts'
            backend: 'oneapi'
    runs-on: ['self-hosted', 'gpu', '${{ matrix.backend }}']
    env:
      # oneAPI specific variables
      OverrideDefaultFP64Settings: ${{ matrix.backend == 'oneapi' && '1' || '' }}
      IGC_EnableDPEmulation: ${{ matrix.backend == 'oneapi' && '1' || '' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Setup Julia
      uses: julia-actions/setup-julia@latest
      with:
        version: ${{ matrix.julia-version }}
    - name: Setup tests
      run: |
        julia --startup-file=no --color=yes --project=./test -e '
          using Pkg
          Pkg.Registry.update()
          Pkg.develop(path=".")
          Pkg.instantiate()'
    - name: Run tests
      env:
        EXAMODELS_SKIP_AOT: "1"
      run: |
        julia --startup-file=no --color=yes --project=./test -e '
          push!(ARGS, "EXAMODELS_NO_TEST_CPU")
          push!(ARGS, "EXAMODELS_TEST_" * uppercase("${{ matrix.backend }}"))
          include("test/runtests.jl")'

  metal:
    strategy:
      matrix:
        julia-version: ['lts', '1']
        julia-arch: [aarch64]
        os: [macos-latest]
        backend: ['metal']
    runs-on: ['self-hosted', 'gpu', '${{ matrix.backend }}']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Julia
        uses: julia-actions/setup-julia@latest
        with:
          version: ${{ matrix.julia-version }}
      - name: Setup tests
        run: |
          julia --startup-file=no --color=yes --project=./test -e '
            using Pkg
            Pkg.Registry.update()
            Pkg.develop(path=".")
            Pkg.instantiate()'
      - name: Show platform info
        run: |
          uname -a
          julia --startup-file=no -e 'println(Sys.ARCH); println(Sys.KERNEL)'
      - name: Run tests
        env:
          EXAMODELS_SKIP_AOT: "1"
        run: |
          julia --startup-file=no --color=yes --project=./test -e '
            push!(ARGS, "EXAMODELS_NO_TEST_CPU")
            push!(ARGS, "EXAMODELS_TEST_METAL")
            include("test/runtests.jl")'
        
