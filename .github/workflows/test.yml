name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        julia-version: ['1', 'lts']
        julia-arch: [x64]
        os: [ubuntu-latest,windows-latest]
    steps:
      - uses: actions/checkout@v2
      - uses: julia-actions/setup-julia@latest
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@latest
      - name: Run tests
        env:
          EXAMODELS_SKIP_AOT: ${{ matrix.os == 'windows-latest' && '1' || '' }}
        run: |
          julia --startup-file=no --color=yes --project=./test -e '
            using Pkg
            Pkg.develop(path=".")
            Pkg.instantiate()
            include("test/runtests.jl")'
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.julia-version == '1' && matrix.os == 'ubuntu-latest'
      - uses: codecov/codecov-action@v5
        if: matrix.julia-version == '1' && matrix.os == 'ubuntu-latest'
        with:
          files: lcov.info
          
  cpu:
    strategy:
      matrix:
        julia-version: ['1', 'lts']
        julia-arch: [x64]
        os: [ubuntu-latest]
    runs-on: ['self-hosted']
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Setup Julia
      uses: julia-actions/setup-julia@latest
      with:
        version: ${{ matrix.julia-version }}
    - name: Setup tests
      run: |
        julia --startup-file=no --color=yes --project=./test -e '
          using Pkg
          Pkg.Registry.update()
          Pkg.develop(path=".")
          Pkg.instantiate()'
    - name: Run tests
      env:
        EXAMODELS_SKIP_AOT: "1"
      run: |
        julia --startup-file=no --color=yes --project=./test -e '
          push!(ARGS, "EXAMODELS_NO_TEST_CPU")
          push!(ARGS, "EXAMODELS_TEST_KA")
          push!(ARGS, "EXAMODELS_TEST_POCL")
          include("test/runtests.jl")'
    
  gpu:
    strategy:
      matrix:
        julia-version: ['1', 'lts']
        julia-arch: [x64]
        os: [ubuntu-latest]
        backend: ['cuda', 'amdgpu', 'oneapi']
        exclude:
          - julia-version: 'lts'
            backend: 'oneapi'
    runs-on: ['self-hosted', 'gpu', '${{ matrix.backend }}']
    env:
      # oneAPI specific variables
      OverrideDefaultFP64Settings: ${{ matrix.backend == 'oneapi' && '1' || '' }}
      IGC_EnableDPEmulation: ${{ matrix.backend == 'oneapi' && '1' || '' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Setup Julia
      uses: julia-actions/setup-julia@latest
      with:
        version: ${{ matrix.julia-version }}
    - name: Setup tests
      run: |
        julia --startup-file=no --color=yes --project=./test -e '
          using Pkg
          Pkg.Registry.update()
          Pkg.develop(path=".")
          Pkg.instantiate()'
    - name: Run tests
      env:
        EXAMODELS_SKIP_AOT: "1"
      run: |
        julia --startup-file=no --color=yes --project=./test -e '
          push!(ARGS, "EXAMODELS_NO_TEST_CPU")
          push!(ARGS, "EXAMODELS_TEST_" * uppercase("${{ matrix.backend }}"))
          include("test/runtests.jl")'

  metal:
    strategy:
      matrix:
        julia-version: ['1', 'lts']
        julia-arch: [aarch64]
        os: [macos-latest]
        backend: ['metal']
    runs-on: ['self-hosted', 'gpu', '${{ matrix.backend }}']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Julia
        uses: julia-actions/setup-julia@latest
        with:
          version: ${{ matrix.julia-version }}
      - name: Setup tests
        run: |
          julia --startup-file=no --color=yes --project=./test -e '
            using Pkg
            Pkg.Registry.update()
            Pkg.develop(path=".")
            Pkg.instantiate()'
      - name: Show platform info
        run: |
          uname -a
          julia --startup-file=no -e 'println(Sys.ARCH); println(Sys.KERNEL)'
      - name: Run tests
        env:
          EXAMODELS_SKIP_AOT: ${{ matrix.os == 'windows-latest' && '1' || '' }}
        run: |
          julia --startup-file=no --color=yes --project=./test -e '
            push!(ARGS, "EXAMODELS_NO_TEST_CPU")
            push!(ARGS, "EXAMODELS_TEST_METAL")
            include("test/runtests.jl")'

  # ── Benchmarks (run after all tests pass, PRs only) ───────────────────────────
  bench-nothing:
    if: github.event_name == 'pull_request'
    needs: [github, cpu, gpu, metal]
    runs-on: ['self-hosted']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - name: Instantiate
        working-directory: benchmark
        run: |
          julia --startup-file=no --project=main    -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
          julia --startup-file=no --project=current -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
      - name: Run benchmark (main)
        working-directory: benchmark
        run: julia --startup-file=no runbenchmark.jl main nothing
      - name: Run benchmark (current)
        working-directory: benchmark
        run: julia --startup-file=no runbenchmark.jl current nothing
      - uses: actions/upload-artifact@v4
        with:
          name: results-nothing
          path: benchmark/benchmark-results-*.csv

  bench-cuda:
    if: github.event_name == 'pull_request'
    needs: [github, cpu, gpu, metal]
    runs-on: ['self-hosted', 'gpu', 'cuda']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - name: Instantiate
        working-directory: benchmark
        run: |
          julia --startup-file=no --project=main    -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
          julia --startup-file=no --project=current -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
      - name: Run benchmark (main)
        working-directory: benchmark
        run: julia --startup-file=no runbenchmark.jl main cuda
      - name: Run benchmark (current)
        working-directory: benchmark
        run: julia --startup-file=no runbenchmark.jl current cuda
      - uses: actions/upload-artifact@v4
        with:
          name: results-cuda
          path: benchmark/benchmark-results-*.csv

  bench-amdgpu:
    if: github.event_name == 'pull_request'
    needs: [github, cpu, gpu, metal]
    runs-on: ['self-hosted', 'gpu', 'amdgpu']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - name: Instantiate
        working-directory: benchmark
        run: |
          julia --startup-file=no --project=main    -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
          julia --startup-file=no --project=current -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
      - name: Run benchmark (main)
        working-directory: benchmark
        run: julia --startup-file=no runbenchmark.jl main amdgpu
      - name: Run benchmark (current)
        working-directory: benchmark
        run: julia --startup-file=no runbenchmark.jl current amdgpu
      - uses: actions/upload-artifact@v4
        with:
          name: results-amdgpu
          path: benchmark/benchmark-results-*.csv

  bench-oneapi:
    if: github.event_name == 'pull_request'
    needs: [github, cpu, gpu, metal]
    runs-on: ['self-hosted', 'gpu', 'oneapi']
    env:
      OverrideDefaultFP64Settings: '1'
      IGC_EnableDPEmulation: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - name: Instantiate
        working-directory: benchmark
        run: |
          julia --startup-file=no --project=main    -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
          julia --startup-file=no --project=current -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
      - name: Run benchmark (main)
        working-directory: benchmark
        run: julia --startup-file=no runbenchmark.jl main oneapi
      - name: Run benchmark (current)
        working-directory: benchmark
        run: julia --startup-file=no runbenchmark.jl current oneapi
      - uses: actions/upload-artifact@v4
        with:
          name: results-oneapi
          path: benchmark/benchmark-results-*.csv

  compare:
    needs: [bench-nothing, bench-cuda, bench-amdgpu, bench-oneapi]
    if: always() && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@latest
        with:
          version: '1'
      - name: Instantiate
        working-directory: benchmark
        run: julia --startup-file=no --project=. -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'
      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: benchmark
          merge-multiple: true
      - name: Compare
        working-directory: benchmark
        run: julia --startup-file=no --project=. compare.jl | tee comparison.txt
      - name: Post results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('benchmark/comparison.txt', 'utf8');
            const marker = '<!-- benchmark-bot -->';
            const body = `${marker}\n## Benchmark Results\n\`\`\`\n${output.trimEnd()}\n\`\`\``;
            const pr_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr_number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr_number, body,
              });
            }
